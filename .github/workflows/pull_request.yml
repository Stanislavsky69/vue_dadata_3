name: Pull request
on: [pull_request]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '24.x'
            - run: yarn --frozen-lockfile
            - run: yarn vue-tsc --noEmit
            - run: yarn run test:run